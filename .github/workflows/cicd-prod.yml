name: 아무말 대잔치 CICD 파이프라인

on:
  push:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [19.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}
      - name: 의존성 설치
        run: npm install
      - name: 테스트 실행
        run: npm test

  build-and-push-image:
    needs: test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v2

      - name: 도커 허브 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: 빌드 및 이미지 푸시
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/fe:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/fe:latest

  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-22.04

    steps:
      - name: SSH Key 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: 도커 설치 여부
        id: check-docker
        run: |
          DOCKER_EXISTS=$(ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'command -v docker >/dev/null && echo "true" || echo "false"')
          echo "docker_exists=$DOCKER_EXISTS" >> $GITHUB_OUTPUT

      - name: 노드 설치 여부 체크
        id: check-nodejs
        run: |
          NODE_EXISTS=$(ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'command -v node >/dev/null && echo "true" || echo "false"')
          echo "node_exists=$NODE_EXISTS" >> $GITHUB_OUTPUT

      - name: EC2 도커 설치
        if: steps.check-docker.outputs.docker_exists == 'false'
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            sudo apt-get update
            sudo apt-get install -y \
              ca-certificates \
              curl \
              gnupg \
              lsb-release
            sudo mkdir -p /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
              | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
              https://download.docker.com/linux/ubuntu \
              $(lsb_release -cs) stable" \
              | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
            sudo usermod -aG docker $USER
          EOF

      - name: EC2 노드 설치
        if: steps.check-nodejs.outputs.node_exists == 'false'
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
            sudo apt-get install -y nodejs
          EOF

      - name: 도커 컴포즈 생성
        run: |
          echo "${{ secrets.DOCKER_COMPOSE_YML }}" > docker-compose.yml

      - name: scp로 파일 전달
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./deploy/docker-compose.yml"
          target: "/home/ubuntu/app/"

      - name: 도커 컴포즈로 배포하기
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /home/${{ secrets.SERVER_USER }}/app
            docker compose pull
            docker compose up -d
            docker compose ps
          EOF

  notify-discord:
    runs-on: ubuntu-22.04
    needs: deploy
    if: always()
    steps:
      - name: Discord 배포 요청 알림
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "${{ needs.deploy.result == 'success' && '✅' || '❌' }} develop 브랜치 배포 결과"
          description: |
            **커밋 메시지**: ${{ github.event.head_commit.message }}
            **작성자**: ${{ github.event.pusher.name }}
            **브랜치**: `${{ github.ref_name }}`

            **📊 빌드/배포 결과**:
            - 상태: ${{ needs.deploy.result == 'success' && '성공' || '실패' }}

            **🔗 링크**:
            - [커밋 확인하기](${{ github.event.head_commit.url }})

          color: "${{ needs.deploy.result == 'success' && 65280 || 16711680 }}"
          username: GitHub Deploy Bot
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
