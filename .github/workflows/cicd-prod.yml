name: KTB 해커톤 ZEUSAI CICD 파이프라인

on:
  push:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [19.x, 20.x, 22.x]

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v2

      - name: 노드 설치
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      - name: 의존성 설치
        run: npm install

      - name: 정적 코드 검사기 실행
        run: npm run lint

  build-and-push-image:
    needs: test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v2

      - name: 도커 허브 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: env 생성
        run: |
          echo "${{ secrets.ENV }}" > .env

      - name: 빌드 및 이미지 푸시
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/zeus-fe:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/zeus-fe:latest

  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-22.04

    steps:

      - name: 체크아웃
        uses: actions/checkout@v4

      - name: docker-compose.yml 전달
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/app/"

      - name: EC2에서 docker-compose 실행
        uses: appleboy/ssh-action@master  # SSH를 사용하여 EC2에서 명령 실행
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # docker-compose 명령어 실행
            cd /home/ubuntu/app/
            docker compose pull
            docker compose up -d front
            docker compose ps

  notify-discord:
    runs-on: ubuntu-22.04
    needs: deploy
    if: always()
    steps:
      - name: Discord 배포 요청 알림
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "${{ needs.deploy.result == 'success' && '✅' || '❌' }} 프런트 develop 브랜치 배포 결과"
          description: |
            **커밋 메시지**: ${{ github.event.head_commit.message }}
            **작성자**: ${{ github.event.pusher.name }}
            **브랜치**: `${{ github.ref_name }}`

            **📊 빌드/배포 결과**:
            - 상태: ${{ needs.deploy.result == 'success' && '성공' || '실패' }}

            **🔗 링크**:
            - [커밋 확인하기](${{ github.event.head_commit.url }})

          color: "${{ needs.deploy.result == 'success' && 65280 || 16711680 }}"
          username: GitHub Deploy Bot
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
